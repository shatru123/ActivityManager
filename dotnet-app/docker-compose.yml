services:
  postgres:
    image: postgres:16
    container_name: lifelogger-postgres
    environment:
      POSTGRES_DB: lifelogger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lifelogger-postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifelogger-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=lifelogger;Username=postgres;Password=postgres
      Jwt__Issuer: LifeLogger.Api
      Jwt__Audience: LifeLogger.Client
      Jwt__SigningKey: ChangeThisSigningKeyBeforeProduction_AtLeast32CharactersLong!
      Jwt__AccessTokenLifetimeMinutes: 30
      Jwt__RefreshTokenLifetimeDays: 30
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  lifelogger-postgres-data:
